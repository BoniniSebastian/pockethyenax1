<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>PHX1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bgBlob blobA"></div>
  <div class="bgBlob blobB"></div>
  <div class="bgBlob blobC"></div>

  <main class="appShell">
    <header class="topBar">
      <div>
        <div class="eyebrow">PocketHyenaX1</div>
        <h1>PHX1</h1>
      </div>

      <button class="iconButton" id="refreshBtn" title="Uppdatera">↻</button>
    </header>

    <section class="statsRow">
      <article class="statCard">
        <span class="statLabel">Samtal idag</span>
        <strong class="statValue" id="callsToday">0</strong>
      </article>

      <article class="statCard">
        <span class="statLabel">Svar idag</span>
        <strong class="statValue" id="answersToday">0</strong>
      </article>
    </section>

    <section class="quickTools">
      <button class="toolChip" data-panel-target="analysisPanel">Analys</button>
      <button class="toolChip" data-panel-target="managePanel">Hantera kort</button>
      <button class="toolChip" data-panel-target="backupPanel">Backup</button>
      <button class="toolChip" data-panel-target="generalNotePanel">Generell anteckning</button>
    </section>

    <section class="panelBlock hidden" id="analysisPanel">
      <div class="panelHead">
        <h2>Analys</h2>
        <button class="ghostButton smallButton" id="toggleTenDaysBtn">Visa 10 dagar</button>
      </div>

      <div class="analysisDays" id="analysisDays"></div>

      <div class="analysisTenDays hidden" id="analysisTenDays"></div>

      <div class="analysisDetail hidden" id="analysisDetail">
        <div class="analysisDetailHead">
          <h3 id="analysisDetailTitle">Logg</h3>
        </div>
        <div id="analysisDetailList" class="analysisDetailList"></div>
      </div>
    </section>

    <section class="panelBlock hidden" id="managePanel">
      <div class="panelHead">
        <h2>Hantera kort</h2>
      </div>

      <form id="cardForm" class="manageForm">
        <input type="hidden" id="cardFormId" />

        <div class="formGrid">
          <label class="field">
            <span>Organisation</span>
            <input id="formName" type="text" placeholder="Kommun / organisation" required />
          </label>

          <label class="field">
            <span>Kontaktperson</span>
            <input id="formContactPerson" type="text" placeholder="Namn på kontakt" />
          </label>

          <label class="field">
            <span>Telefonnummer</span>
            <input id="formPhone" type="text" placeholder="070..." />
          </label>

          <label class="field">
            <span>E-post</span>
            <input id="formEmail" type="email" placeholder="mail@kund.se" />
          </label>

          <label class="field">
            <span>VNR</span>
            <input id="formVnr" type="text" placeholder="5528" />
          </label>

          <label class="field">
            <span>Länk</span>
            <input id="formLink" type="url" placeholder="https://..." />
          </label>

          <label class="field">
            <span>Status</span>
            <input id="formStatus" type="text" placeholder="Ej prospekterad / Prospekterad / Bokat möte" />
          </label>

          <label class="field">
            <span>Viktig information</span>
            <input id="formImportantInfo" type="text" placeholder="Få tag på honom vecka 12" />
          </label>
        </div>

        <label class="field">
          <span>Anteckningar</span>
          <textarea id="formNotes" rows="5" placeholder="Kundanteckningar..."></textarea>
        </label>

        <div class="formActions">
          <button type="submit" class="primaryButton">Spara kort</button>
          <button type="button" class="ghostButton" id="resetCardFormBtn">Nytt kort</button>
        </div>
      </form>

      <div id="manageList" class="manageList"></div>
    </section>

    <section class="panelBlock hidden" id="backupPanel">
      <div class="panelHead">
        <h2>Backup</h2>
      </div>

      <div class="backupActions">
        <button class="primaryButton" id="downloadTemplateBtn">Ladda ner Excel-mall</button>
        <button class="ghostButton" id="exportExcelBtn">Exportera Excel</button>
      </div>

      <label class="field importField">
        <span>Importera Excel (skriver över alla kort)</span>
        <input id="importExcelInput" type="file" accept=".xlsx,.xls" />
      </label>

      <p class="helperText">
        Importen skriver över alla befintliga kort. Samtalsloggen behålls.
      </p>
    </section>

    <section class="panelBlock hidden" id="generalNotePanel">
      <div class="panelHead">
        <h2>Generell anteckning</h2>
      </div>

      <label class="field">
        <span>Manus / standardtext / stöd</span>
        <textarea id="generalNoteInput" rows="10" placeholder="Skriv ditt manus här..."></textarea>
      </label>

      <div class="formActions">
        <button class="primaryButton" id="saveGeneralNoteBtn">Spara</button>
        <button class="ghostButton" id="copyGeneralNoteBtn">Kopiera text</button>
      </div>
    </section>

    <section class="listHead">
      <h2>Säljkort</h2>

      <div class="filterRow">
        <button class="filterButton active" data-filter="all">Alla</button>
        <button class="filterButton" data-filter="unprospected">Ej prospekterad</button>
        <button class="filterButton" data-filter="prospected">Prospekterad</button>
      </div>
    </section>

    <section id="cards" class="cardsGrid"></section>
  </main>

  <div class="sheetOverlay" id="sheetOverlay"></div>

  <aside class="bottomSheet" id="bottomSheet" aria-hidden="true">
    <div class="sheetTopBar">
      <button class="sheetClose" id="closeSheetBtn" aria-label="Stäng">✕</button>
      <div class="sheetHandle"></div>
    </div>

    <div class="sheetContent">
      <div class="sheetHero">
        <div class="sheetInfoLine" id="sheetImportantInfo"></div>
        <h2 class="sheetOrgName" id="sheetName">Organisation</h2>
        <div class="sheetContactPreview" id="sheetContactPreview">Kontakt saknas</div>
        <div class="sheetStatus" id="sheetStatus"></div>

        <div class="sheetTopActions">
          <button class="ghostButton smallButton" id="markProspectedBtn">Prospekterad</button>
          <button class="ghostButton smallButton" id="openGeneralNoteFromCardBtn">Generell anteckning</button>
        </div>
      </div>

      <section class="sheetSection accordionSection">
        <button class="accordionHeader" data-accordion-target="contactAccordionBody">
          <span>Kontakt</span>
          <span class="accordionArrow">⌄</span>
        </button>

        <div class="accordionBody" id="contactAccordionBody">
          <div class="fieldStack">
            <label class="field">
              <span>Organisation</span>
              <input id="sheetNameInput" type="text" />
            </label>

            <label class="field">
              <span>Kontaktperson</span>
              <input id="sheetContactPersonInput" type="text" />
            </label>

            <label class="field">
              <span>Telefonnummer</span>
              <input id="sheetPhoneInput" type="text" />
            </label>

            <label class="field">
              <span>E-post</span>
              <input id="sheetEmailInput" type="email" />
            </label>

            <label class="field">
              <span>VNR</span>
              <input id="sheetVnrInput" type="text" />
            </label>

            <label class="field">
              <span>Länk</span>
              <input id="sheetLinkInput" type="url" />
            </label>

            <label class="field">
              <span>Viktig information</span>
              <input id="sheetImportantInfoInput" type="text" />
            </label>

            <label class="field">
              <span>Status</span>
              <input id="sheetStatusInput" type="text" />
            </label>
          </div>

          <div class="sheetLinkRow">
            <a id="sheetPhoneLink" class="sheetActionLink hidden" href="#">Ring</a>
            <a id="sheetOpenLink" class="sheetActionLink hidden" href="#" target="_blank" rel="noopener noreferrer">Öppna länk</a>
          </div>

          <div class="rowActions">
            <button class="primaryButton" id="saveContactInfoBtn">Spara kontaktinfo</button>
          </div>
        </div>
      </section>

      <section class="sheetSection">
        <div class="sectionMiniHead">Anteckningar</div>
        <label class="field">
          <textarea id="sheetNotesInput" rows="6" placeholder="Kundanteckningar..."></textarea>
        </label>

        <div class="rowActions">
          <button class="primaryButton" id="saveNotesBtn">Spara anteckningar</button>
          <button class="ghostButton" id="mailCrmBtn">Maila CRM</button>
        </div>
      </section>

      <section class="sheetSection">
        <div class="sectionMiniHead">Logga samtal</div>

        <div class="callLogFlow">
          <button class="primaryButton" id="startLogCallBtn">Logga samtal</button>

          <div class="callStep hidden" id="callStepPrimary">
            <button class="choiceButton" data-primary-outcome="Inget svar">Inget svar</button>
            <button class="choiceButton" data-primary-outcome="Svarade">Svarade</button>
          </div>

          <div class="callStep hidden" id="callStepSecondary">
            <button class="choiceButton" data-secondary-outcome="Bokat möte">Bokat möte</button>
            <button class="choiceButton" data-secondary-outcome="Ej intresserad">Ej intresserad</button>
          </div>
        </div>
      </section>

      <section class="sheetSection">
        <div class="sectionMiniHead">Kundens logg</div>
        <div id="customerLogList" class="customerLogList"></div>
      </section>

      <section class="sheetSection">
        <div class="sectionMiniHead">Generell anteckning</div>
        <label class="field">
          <textarea id="sheetGeneralNoteInput" rows="6" placeholder="Generell anteckning / manus..."></textarea>
        </label>
        <div class="rowActions">
          <button class="primaryButton" id="saveGeneralNoteFromCardBtn">Spara</button>
          <button class="ghostButton" id="copyGeneralNoteFromCardBtn">Kopiera</button>
        </div>
      </section>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
